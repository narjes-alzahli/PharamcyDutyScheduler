[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Fallback only if DATABASE_URL is unset; Alembic reads backend.database.DATABASE_URL when env.py runs.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/pharmacy_scheduler


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

